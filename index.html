<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Health Diagnosis & Treatment Planner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>AI-Powered Health Diagnosis</h1>
        <p>Your health, your priority!</p>
    </header>

    <main>
        <section class="form-section">
            <h2>Enter Your Symptoms</h2>
            <form id="diagnosisForm">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required placeholder="Enter your name">

                <label for="age">Age:</label>
                <input type="number" id="age" name="age" required placeholder="Enter your age">

                <label for="symptoms">Symptoms:</label>
                <textarea id="symptoms" name="symptoms" rows="5" required placeholder="Describe your symptoms"></textarea>

                <button type="submit">Get Diagnosis</button>
            </form>
        </section>

        <section class="result-section" id="resultSection" hidden>
            <h2>Diagnosis Result</h2>
            <p id="resultMessage"></p>
            <div id="treatmentPlan" class="treatment-plan"></div>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 AI Health Diagnosis. All Rights Reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
